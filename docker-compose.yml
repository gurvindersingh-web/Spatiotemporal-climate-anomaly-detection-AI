services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CDS_API_KEY=${CDS_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
